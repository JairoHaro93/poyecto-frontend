<div class="area-cobertura">
  <section class="map-area">
    @if (!isReady) {
      <div class="loading-overlay">
        <div class="spinner"></div>
        <p>Cargando mapa…</p>
      </div>
    } @else {
      @if (isGoogleMapsLoaded) {
        <google-map
          width="100%"
          height="100%"
          [zoom]="zoom()"
          [center]="myposition() || DEFAULT_CENTER"
          [options]="{
            mapTypeId: 'satellite',
            streetViewControl: false,
            mapTypeControl: false,
            fullscreenControl: false,
            gestureHandling: 'greedy',
          }"
          (mapClick)="onMapClick($event)"
        >
          @for (m of markers; track m.id) {
            <map-marker
              [position]="m.position"
              [title]="m.title"
              [options]="m.options"
              (mapClick)="onMarkerClick(m)"
            ></map-marker>
          }
        </google-map>
      } @else {
        <div class="loading-overlay">
          <div class="spinner"></div>
          <p>Cargando Google Maps…</p>
        </div>
      }
    }

    @if (measuring()) {
      <div class="distance-panel">
        <div class="d-flex align-items-center gap-2">
          <strong>Distancia</strong>
          <span class="ms-auto badge bg-dark">{{ distanceLabel() }}</span>
        </div>

        <div class="small text-muted mt-1">
          Puntos: {{ measurePoints().length }} — clic en el mapa (o en una NAP)
          para agregar.
        </div>

        <div class="mt-2 d-flex gap-2 flex-wrap">
          <button
            class="btn btn-sm btn-outline-secondary"
            type="button"
            (click)="undoMeasure()"
          >
            Deshacer
          </button>
          <button
            class="btn btn-sm btn-outline-secondary"
            type="button"
            (click)="clearMeasure()"
          >
            Limpiar
          </button>
          <button
            class="btn btn-sm btn-outline-danger ms-auto"
            type="button"
            (click)="stopMeasuring()"
          >
            Salir
          </button>
        </div>
      </div>
    }

    <div class="fab-toolbar">
      <button
        class="btn-dark"
        type="button"
        [class.active]="measuring()"
        (click)="toggleMeasuring()"
      >
        Distancia
      </button>
    </div>
  </section>
</div>
